<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxySpin | The new in-game game site!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<style>
:root {
  --bg-primary: #0b0a12;
  --bg-surface: rgba(17,15,26,0.92);
  --bg-card: rgba(17,15,26,0.96);
  --violet: #8b5cf6;
  --violet-light: #c084fc;
  --violet-glow: rgba(139,92,246,0.18);
  --border-color: #302060;
  --text-primary: #eee8ff;
  --text-muted: rgba(238,232,255,.76);
  --text-accent: rgba(192,132,252,.62);
  --font-body: 'Inter', sans-serif;
  --font-header: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
  --font-chat: 'Manrope', 'Inter', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--violet); border-radius: 2px; }
body {
  background: var(--bg-primary);
  background-image:
    radial-gradient(1100px 500px at 10% 0%, rgba(139,92,246,.18), transparent 65%),
    radial-gradient(900px 450px at 90% 15%, rgba(192,132,252,.16), transparent 70%);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(17,15,26,0.94);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--violet-glow);
  box-shadow: 0 18px 42px rgba(0,0,0,.32);
  padding: 8px 24px;
  min-height: 60px;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 100%; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-primary); font-family: var(--font-header); font-weight: 900; font-size: 22px; letter-spacing: -0.02em; }
.logo-img { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--violet), #4b0082); display: flex; align-items: center; justify-content: center; font-size: 28px; filter: drop-shadow(0 0 12px rgba(139,92,246,.4)); }
.nav-icons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.nav-icon { width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, rgba(255,255,255,.05), transparent 24%), linear-gradient(135deg, rgba(139,92,246,.14), rgba(17,15,26,.94)); border: 1px solid var(--violet-glow); cursor: pointer; transition: all .2s; position: relative; font-size: 20px; color: var(--text-primary); text-decoration: none; }
.login-btn { min-height: 48px; padding: 8px 24px; border-radius: 18px; background: transparent; border: 1px solid var(--violet-glow); color: var(--text-primary); font-weight: 800; font-size: 14px; font-family: var(--font-header); letter-spacing: 0.02em; cursor: pointer; transition: all .2s; }
.login-btn:hover { background: rgba(139,92,246,.12); border-color: var(--violet); }
/* rest of CSS ... game-selector, stat-box, match-card, chat-sidebar, modal, etc. */
</style>
</head>
<body>
</body>
</html>
